<!doctype html>
<html lang="zh-CN">
<head>

  <script>
    (() => {
      const saved = localStorage.getItem('cs-theme');
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (dark ? 'dark' : 'light');
      const lang = localStorage.getItem('cs-lang') === 'en' ? 'en' : 'zh';
      document.documentElement.dataset.lang = lang;
      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
    })();
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/executive-os.css">

<body data-page="shop">
  <a class="skip-link" href="#main">跳到正文</a>
  <div data-site-header></div>

  <main id="main" class="page-main">
    <section class="page-hero shell compact shop-hero">
      <p class="eyebrow" data-i18n-zh="扶手资源控制台" data-i18n-en="Armrest Resource Console">扶手资源控制台</p>

        <span class="boundary-signal"><i></i><b data-i18n-zh="边界清晰" data-i18n-en="Boundary Clear">边界清晰</b></span>
        <strong data-i18n-zh="合规声明" data-i18n-en="Boundary System">合规声明</strong>
        <p data-i18n-zh="不提供侵犯平台或他人权益的内容；不售卖作弊、破解、盗号、绕过平台规则的工具。所有脚本仅限学习、效率、配置、个人自动化和合法场景。" data-i18n-en="No content that violates platform or third-party rights; no cheating, cracking, account theft, or platform bypass tools. Scripts are limited to learning, efficiency, configuration, personal automation, and lawful use.">不提供侵犯平台或他人权益的内容；不售卖作弊、破解、盗号、绕过平台规则的工具。所有脚本仅限学习、效率、配置、个人自动化和合法场景。</p>
      </div>
      <div class="shop-console-deck">
        <div class="shop-console-readout" aria-live="polite">
          <span data-i18n-zh="资源陈列" data-i18n-en="Resource Display">资源陈列</span>
          <strong id="shop-product-count">0 件</strong>
          <i aria-hidden="true"></i>
          <b id="shop-active-category">全部板块</b>

        <div class="shop-toolbar" id="shop-category-controls" aria-label="商品筛选" data-i18n-aria-zh="商品筛选" data-i18n-aria-en="Product filters"></div>
      </div>
      <div class="product-showroom" id="shop-products" aria-live="polite"></div>

  <div data-site-footer></div>
  <script src="data/posts.js" defer></script>
  <script src="data/products.js" defer></script>
  <script src="assets/js/main.js" defer></script>
