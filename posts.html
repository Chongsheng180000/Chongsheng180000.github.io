<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文章 | 重生日记</title>
  <meta name="description" content="重生日记的文章列表，包含随笔、日常、经验、思想、工具和商品说明。">
  <meta name="theme-color" content="#10110f">
  <link rel="canonical" href="https://chongsheng180000.github.io/posts.html">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <meta property="og:type" content="website">
  <meta property="og:title" content="文章 | 重生日记">
  <meta property="og:description" content="按分类、标签和关键词筛选文章。">
  <meta property="og:url" content="https://chongsheng180000.github.io/posts.html">
  <script>
    (() => {
      const saved = localStorage.getItem('cs-theme');
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (dark ? 'dark' : 'light');
      const lang = localStorage.getItem('cs-lang') === 'en' ? 'en' : 'zh';
      document.documentElement.dataset.lang = lang;
      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
    })();
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/executive-os.css">
  <link rel="stylesheet" href="assets/css/executive-pages.css">
</head>
<body data-page="posts">
  <a class="skip-link" href="#main">跳到正文</a>
  <div data-site-header></div>

  <main id="main" class="page-main">
    <section class="page-hero shell compact navigation-archive-hero">
      <p class="eyebrow" data-i18n-zh="导航归档" data-i18n-en="Navigation Archive">导航归档</p>
      <h1 data-i18n-zh="文章路线" data-i18n-en="Reading Routes">文章路线</h1>
      <p data-i18n-zh="随笔、日常、经验和商品说明都在这里。按时间、分类或标签回看，找到能用的那篇就行。" data-i18n-en="Essays, daily notes, experience, and shelf notes live here. Browse by time, category, or tag and open the route you need.">随笔、日常、经验和商品说明都在这里。按时间、分类或标签回看，找到能用的那篇就行。</p>
    </section>

    <section class="shell archive-layout navigation-archive-cluster" aria-label="文章筛选和列表">
      <aside class="filter-panel" aria-label="筛选">
        <label class="field-label" for="post-search" data-i18n-zh="搜索" data-i18n-en="Search">搜索</label>
        <input id="post-search" class="input" type="search" placeholder="标题、摘要、标签" data-i18n-placeholder-zh="标题、摘要、标签" data-i18n-placeholder-en="Title, summary, or tag">

        <label class="field-label" for="post-sort" data-i18n-zh="排序" data-i18n-en="Sort">排序</label>
        <select id="post-sort" class="input">
          <option value="newest" data-i18n-zh="最新在前" data-i18n-en="Newest first">最新在前</option>
          <option value="oldest" data-i18n-zh="最早在前" data-i18n-en="Oldest first">最早在前</option>
        </select>

        <div class="filter-group">
          <p class="field-label" data-i18n-zh="分类" data-i18n-en="Drive Mode">分类</p>
          <div class="chip-list" id="category-filters"></div>
        </div>

        <div class="filter-group">
          <p class="field-label" data-i18n-zh="标签" data-i18n-en="Tags">标签</p>
          <div class="chip-list" id="tag-filters"></div>
        </div>
      </aside>

      <div class="archive-results">
        <div class="result-head">
          <span id="post-count">0 篇</span>
          <a class="text-link" href="rss.xml">RSS</a>
        </div>
        <div class="post-list" id="posts-list" aria-live="polite"></div>
        <p class="empty-state" id="posts-empty" hidden data-i18n-zh="没找到。换个词，或者把筛选收一收。" data-i18n-en="Nothing matched. Try another word or loosen the filters.">没找到。换个词，或者把筛选收一收。</p>
      </div>
    </section>
  </main>

  <div data-site-footer></div>
  <script src="data/posts.js" defer></script>
  <script src="data/products.js" defer></script>
  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/executive-pages.js" defer></script>
</body>
</html>
